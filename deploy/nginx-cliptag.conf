# cliptag.ai — additive nginx vhost (coexists with other sites on the box).
# HTTP only; `certbot --nginx` adds the 443 block + HTTP→HTTPS redirect afterwards.
server {
    listen 80;
    listen [::]:80;
    server_name cliptag.ai www.cliptag.ai;
    root /var/www/cliptag-landing;
    index index.html;

    # Astro static output → clean URLs, served directly (no trailing-slash 301):
    # /privacy → /privacy/index.html, /de → /de/index.html
    location / {
        try_files $uri.html $uri/index.html $uri =404;
    }

    # Hashed assets: cache forever
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    error_page 404 /404.html;

    # Security headers (HTML)
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://*.paddle.com https://*.posthog.com; img-src 'self' data: https://www.googletagmanager.com https://www.google-analytics.com https://*.paddle.com https://*.posthog.com; connect-src 'self' https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com https://www.googletagmanager.com https://ipapi.co https://api.web3forms.com https://*.paddle.com https://qqhomwfkxcjgzzrreiia.supabase.co https://cliptag-proxy.fly.dev https://*.posthog.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://*.paddle.com; font-src 'self'; frame-src https://*.paddle.com; base-uri 'self'; frame-ancestors 'self'; form-action 'self'" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;
}
