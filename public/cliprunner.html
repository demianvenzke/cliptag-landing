 function pushGround(d,x){ const [nw,nh]=natOf(d.img); const dispH=d.dispH, dispW=nw*dispH/nh;

  const keys=['cam','cam','glight','chair'], d=DEF[keys[Math.floor(Math.random()*keys.length)]];

  const _elapsedS=(performance.now()-(_gameState.startTime||performance.now()))/1000;

 function checkCollision(o){ const p=_gameState.player, px=p.x-17, py=p.y-95, pw=34, ph=93; let bx,by,bw,bh;

  const HVX=36.5*1.3, HVY=10.8, ca=Math.cos(armAng), sa=Math.sin(armAng);

  const figY=(crashing?gy:p.y)-bob;
  if(s._prevFigY==null) s._prevFigY=figY;
  const figVy=figY-s._prevFigY; s._prevFigY=figY;
  s.camLag=((s.camLag||0)-figVy*0.7)*0.80;
  const localLag=Math.max(-30,Math.min(30,s.camLag))/PSCALE;
  const h=Math.max(0,gy-p.y),k=Math.min(1,h/260);
  softShadow(p.x+slide,gy+4,34*(1-0.4*k),0.28*(1-0.55*k));
  ctx.save(); ctx.translate(p.x+slide,(crashing?gy:p.y)-bob); ctx.rotate(lean);
  ctx.scale(PSCALE*sx,PSCALE*sy);
  // vertikaler Motion-Blur-Geist bei schnellem Steigen/Fallen (Sprung)
  if(!crashing && Math.abs(p.vy)>5){ ctx.globalAlpha=0.22; ctx.save(); ctx.translate(0,-p.vy*0.22); drawFigure(grounded,ph,localLag); ctx.restore(); ctx.globalAlpha=1; }
  drawFigure(grounded,ph,localLag);
  ctx.restore();
 }

 // ===================== OBSTACLES =====================
 function drawObstacle(o){
  const d=o.d, gy=_gameState.groundY, img=IMG[d.img];
  if(o.ground){
   softShadow(o.x+o.dispW/2, gy+4, o.dispW*0.52, 0.20);
   if(img) blurDraw(img,o.x,o.drawY,o.dispW,o.dispH,o.flip);
  } else {
   const lx=o.x+o.dispW/2;
   ctx.strokeStyle='rgba(40,42,52,0.7)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(lx,-10); ctx.lineTo(lx,o.top+8); ctx.stroke();
   if(img) blurDraw(img,o.x,o.top,o.dispW,o.dispH,o.flip);
  }
 }

 // ===================== HINTERGRUND-EBENEN =====================
 function drawTiled(img,dispW,dispH,topY,scroll){ const W=_gameState.W;
  let off=((scroll % dispW)+dispW)%dispW;
  for(let x=-off; x<W+1; x+=dispW) ctx.drawImage(img,x,topY,dispW,dispH); }
 function drawBackground(){ const s=_gameState,img=IMG.bg; if(!img){ ctx.fillStyle='#d9dbe2'; ctx.fillRect(0,0,s.W,s.H); return; }
  const [nw,nh]=BGSZ.bg, scale=s.H/nh, dispW=nw*scale; drawTiled(img,dispW,s.H,0,s.bgScroll); }
 function drawFg3(){ const s=_gameState,gy=s.groundY,img=IMG.fg3; if(!img) return; const [nw,nh]=BGSZ.fg3;
  const dispH=s.H*0.30, dispW=nw*dispH/nh, top=(gy-s.H*0.02)-dispH;
  ctx.globalAlpha=0.92; drawTiled(img,dispW,dispH,top,s.f3Scroll); ctx.globalAlpha=1; }
 function drawFg2(){ const s=_gameState,gy=s.groundY,img=IMG.fg2; if(!img){ ctx.fillStyle='#8e93a3'; ctx.fillRect(0,gy,s.W,s.H-gy); return; } const [nw,nh]=BGSZ.fg2;
  const dispH=(s.H-gy)+s.H*0.06, dispW=nw*dispH/nh, top=gy-s.H*0.06;
  drawTiled(img,dispW,dispH,top,s.gScroll); }
 function drawFg1(){ const s=_gameState,gy=s.groundY,img=IMG.fg1; if(!img) return; const [nw,nh]=BGSZ.fg1;
  const dispH=(s.H-gy)+12, dispW=nw*dispH/nh, top=gy;
  drawTiled(img,dispW,dispH,top,s.f1Scroll); }

 // ---------------- PARTIKEL ----------------
 function stumbleDust(x,y){ for(let i=0;i<16;i++){ const a=-Math.PI/2+(Math.random()-0.5)*1.7, sp=1.5+Math.random()*3.5;
  _gameState.particles.push({x:x+(Math.random()-0.5)*22,y,vx:Math.cos(a)*sp-1.5,vy:Math.sin(a)*sp,life:1,size:2+Math.random()*3,
   color:['#16151c','#3a3a42','#9a9ea8'][Math.floor(Math.random()*3)]}); } }
 function drawParticles(){ _gameState.particles.forEach(p=>{ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color; ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size); }); ctx.globalAlpha=1; }


 // ===================== OSCARS (Sammelobjekte) =====================
 const OW=30, OH=50;
 function addOscarArc(xc, baseY, n){ for(let i=0;i<n;i++){ const t=(n===1)?0:(i-(n-1)/2);
   const ox=xc+t*40, peak=(n>1)?(1-Math.abs(t)/(((n-1)/2)||1))*24:0;
   _gameState.oscars.push({x:ox, y:baseY-peak, ph:Math.random()*6.28}); } }
 function collectFx(x,y){ for(let i=0;i<14;i++){ const a=Math.random()*Math.PI*2, sp=2+Math.random()*4;
   _gameState.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:1,size:2+Math.random()*3,
    color:['#ffd54a','#f2b705','#fff1b8'][Math.floor(Math.random()*3)]}); }
   _gameState.floatTxt.push({x,y,life:1,txt:'+100'}); }
 function drawOscars(){ const s=_gameState, img=IMG.oscar; if(!img) return;
   s.oscars.forEach(o=>{ const bob=Math.sin(s.animT*3+o.ph)*4, y=o.y+bob;
    const g=ctx.createRadialGradient(o.x,y,0,o.x,y,24); g.addColorStop(0,'rgba(255,210,80,0.40)'); g.addColorStop(1,'rgba(255,210,80,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(o.x,y,24,0,Math.PI*2); ctx.fill();
    ctx.drawImage(img,o.x-OW/2,y-OH/2,OW,OH); }); }

 // ===================== UPDATE =====================
 function update(dt){
  const s=_gameState; if(!_gameCanvas||!document.body.contains(_gameCanvas)){ stopMiniGame(); return; }
  s.animT+=dt; s.introT=Math.min(1,(s.introT||0)+dt/0.9); s.shake*=Math.pow(0.86,dt*60);
  // Flimmer (Diashow): pendelt zu 1 zurueck, faellt gelegentlich kurz ab
  s.flicker+=(1-s.flicker)*Math.min(1,dt*9); if(Math.random()<0.022) s.flicker=0.92+Math.random()*0.05;
  const base=(s.mode==='play')?s.speed:(s.mode==='idle'?5:3.0), f=dt*60;
  s.bgScroll+=base*0.18*f; s.f3Scroll+=base*0.45*f; s.gScroll+=base*1.0*f; s.f1Scroll+=base*1.15*f;
  if(s.particles.length){ for(let i=s.particles.length-1;i>=0;i--){ const p=s.particles[i]; p.x+=p.vx;p.y+=p.vy;p.vy+=0.3;p.life-=dt*0.8; if(p.life<=0)s.particles.splice(i,1); } }
  if(s.floatTxt&&s.floatTxt.length){ for(let i=s.floatTxt.length-1;i>=0;i--){ const t=s.floatTxt[i]; t.y-=0.7*f; t.life-=dt*0.9; if(t.life<=0)s.floatTxt.splice(i,1);} }
  if(s.mode==='stumble'){ s.stumbleT+=dt; if(s.stumbleT>0.7) s.mode='over'; }
  // Attract-Mode: Figur laeuft schon (ohne Obstacles)
  if(s.mode==='idle'){ s.player.legFrame=(s.player.legFrame+dt*(5*0.45))%1; }
  if(s.mode!=='play') return;

  const elapsed=(performance.now()-(s.startTime||performance.now()))/1000, step=Math.floor(elapsed/10);
  if(step>s._lastSpeedStep){ s._lastSpeedStep=step; s.speed+=1; s.speedFlashT=0.5; }
  s.distance+=s.speed*f; s.score=Math.floor(s.distance/5)+(s.bonus||0);
  if(scoreEl) scoreEl.textContent=String(s.score).padStart(5,'0');

  const p=s.player;
  if((_gameKeys['Space']||_gameKeys[' ']||_gameKeys['ArrowUp'])&&p.y>=s.groundY-0.1) p.vy=-16;
  const hold=(_gameKeys['Space']||_gameKeys[' ']||_gameKeys['ArrowUp']);
  const g=(hold&&p.vy<0)?0.48:0.72; p.vy+=g*f; p.y+=p.vy*f; if(p.y>=s.groundY){ p.y=s.groundY; p.vy=0; }
  const tl=(p.y<s.groundY-0.5)?Math.max(-0.22,Math.min(0.22,p.vy*0.012)):0; p.lean+=(tl-p.lean)*Math.min(1,dt*8);
  if(p.y>=s.groundY-0.1){ p.legFrame=(p.legFrame+dt*(s.speed*0.45))%1; }

  s.spawnTimer-=f*(s.speed/5); if(s.spawnTimer<=0){ spawn(); s.spawnTimer=78+Math.random()*(130-Math.min(60,s.speed*5)); }
  for(let i=s.obstacles.length-1;i>=0;i--){ const o=s.obstacles[i]; o.x-=s.speed*f;
   if(o.x+o.dispW<-60){ s.obstacles.splice(i,1); continue; }
   if(checkCollision(o)){ s.mode='stumble'; s.stumbleT=0; s.shake=8; s.flashT=0.25; stumbleDust(p.x+6,s.groundY);
    if(s.score>bestScore){ bestScore=s.score; try{sessionStorage.setItem('cliptag_game_best',String(bestScore));}catch(e){} if(bestEl) bestEl.textContent=bestScore; }
    break; } }
  for(let i=s.oscars.length-1;i>=0;i--){ const o=s.oscars[i]; o.x-=s.speed*f;
   if(o.x+OW< -40){ s.oscars.splice(i,1); continue; }
   const oy=o.y+Math.sin(s.animT*3+o.ph)*4, px=p.x-17,py=p.y-95,pw=34,ph2=93;
   if(px<o.x+OW/2 && px+pw>o.x-OW/2 && py<oy+OH/2 && py+ph2>oy-OH/2){ s.bonus+=100; s.oscarCount+=1; if(oscEl)oscEl.textContent=s.oscarCount; collectFx(o.x,oy); s.oscars.splice(i,1); } }
  if(s.flashT>0) s.flashT-=dt; if(s.speedFlashT>0) s.speedFlashT-=dt;
 }

 // ===================== DRAW =====================
 function draw(){
  const s=_gameState,W=s.W,H=s.H;
  drawBackground();
  drawFg3();
  drawFg2();
  drawFg1();

  const shx=(Math.random()*2-1)*s.shake, shy=(Math.random()*2-1)*s.shake;
  ctx.save(); ctx.translate(shx,shy);
  s.obstacles.forEach(drawObstacle);
  drawOscars();
  drawPlayer();
  if(s.particles.length) drawParticles();
  if(s.floatTxt&&s.floatTxt.length){ ctx.font='bold 16px Inter, -apple-system, sans-serif'; ctx.textAlign='center'; s.floatTxt.forEach(t=>{ ctx.globalAlpha=Math.max(0,t.life); ctx.fillStyle='#f2b705'; ctx.fillText(t.txt,t.x,t.y); }); ctx.globalAlpha=1; }
  ctx.restore();

  if(s.flashT>0){ ctx.fillStyle='#000'; ctx.globalAlpha=(s.flashT/0.25)*0.10; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1; }

  // ---- Grain/Noise ueber alles ----
  if(window._gameGrainCanvas){ if(!s._grainOx||(s._grainC||0)%3===0){ s._grainOx=-Math.floor(Math.random()*200); s._grainOy=-Math.floor(Math.random()*200); }
   s._grainC=(s._grainC||0)+1; ctx.save(); ctx.globalAlpha=0.09; const gc=window._gameGrainCanvas;
   for(let yy=s._grainOy;yy<H;yy+=200) for(let xx=s._grainOx;xx<W;xx+=200) ctx.drawImage(gc,xx,yy); ctx.restore(); }
  // ---- Flimmer (kurzer Helligkeits-Blitz, wie Projektor/Diashow) ----
  if(s.flicker<1){ ctx.fillStyle=`rgba(255,255,255,${(1-s.flicker)*0.9})`; ctx.fillRect(0,0,W,H); }

  // ---- Idle/Attract Prompt + Game Over ----
  if(s.mode==='idle'){ ctx.textAlign='center';
   ctx.fillStyle='rgba(20,22,28,.82)'; ctx.font='bold 19px Inter, -apple-system, sans-serif';
   ctx.fillText(_assetsReady?'Leertaste / Klick = Start':'Lade Assets...', W/2, H*0.30);
  }
  if(s.mode==='over'){ ctx.fillStyle='rgba(0,0,0,0.30)'; ctx.fillRect(0,0,W,H);
   ctx.fillStyle='#fff'; ctx.font='bold 40px Inter, -apple-system, sans-serif'; ctx.textAlign='center';
   ctx.fillText('GAME OVER', W/2, H/2-4); ctx.font='14px Inter, -apple-system, sans-serif'; ctx.fillStyle='rgba(255,255,255,.85)';
   ctx.fillText('Leertaste = neuer Versuch', W/2, H/2+24); }

  // ---- weiche Randausblendung (alle Seiten) + sanfte Vignette ----
  const bg=getComputedStyle(document.body).getPropertyValue('--bg').trim()||'#f5f6f8';
  const sideW=Math.round(W*0.30), topH=Math.round(H*0.34), botH=Math.round(H*0.32);
  let gL=ctx.createLinearGradient(0,0,sideW,0); gL.addColorStop(0,bg); gL.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=gL; ctx.fillRect(0,0,sideW,H);
  let gR=ctx.createLinearGradient(W-sideW,0,W,0); gR.addColorStop(0,'rgba(255,255,255,0)'); gR.addColorStop(1,bg);
  ctx.fillStyle=gR; ctx.fillRect(W-sideW,0,sideW,H);
  let gT=ctx.createLinearGradient(0,0,0,topH); gT.addColorStop(0,bg); gT.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=gT; ctx.fillRect(0,0,W,topH);
  let gB=ctx.createLinearGradient(0,H-botH,0,H); gB.addColorStop(0,'rgba(255,255,255,0)'); gB.addColorStop(1,bg);
  ctx.fillStyle=gB; ctx.fillRect(0,H-botH,W,botH);
  const vig=ctx.createRadialGradient(W/2,H*0.5,Math.min(W,H)*0.26,W/2,H*0.5,Math.max(W,H)*0.58);
  vig.addColorStop(0,'rgba(255,255,255,0)'); vig.addColorStop(1,bg);
  ctx.globalAlpha=0.85; ctx.fillStyle=vig; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1;
  // Intro: ganze Szene (mit schon rennendem Maennchen) sanft einblenden
  const fa=Math.pow(1-(s.introT||1),1.4); if(fa>0.001){ ctx.globalAlpha=fa; ctx.fillStyle=bg; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1; }
 }

 let lastT=performance.now(); const TARGET=1000/50; let lastDraw=0;
 let _dl=performance.now(),_wg=0,_fc=0,_ut=0,_dtt=0;
 setInterval(()=>{ if(!_gameState) return;
  console.log(`[GAME] frames=${_fc} avgUpd=${(_ut/Math.max(1,_fc)).toFixed(2)}ms avgDraw=${(_dtt/Math.max(1,_fc)).toFixed(2)}ms worstGap=${_wg.toFixed(0)}ms obst=${_gameState.obstacles.length}`);
  _wg=0;_fc=0;_ut=0;_dtt=0; },5000);
 function loop(){ if(!_gameCanvas||!document.body.contains(_gameCanvas)){ _gameRAF=null; return; }
  const now=performance.now(),gap=now-_dl; if(gap>_wg)_wg=gap; if(gap>200) console.log(`[GAME] HAKLER ${gap.toFixed(0)}ms`); _dl=now;
  if(now-lastDraw>=TARGET){ const dt=Math.min(0.05,(now-lastT)/1000); lastT=now; lastDraw=now;
   const a=performance.now(); update(dt); const b=performance.now(); draw(); const c=performance.now();
   _ut+=(b-a);_dtt+=(c-b);_fc++; }
  _gameRAF=requestAnimationFrame(loop); }
 loop();
}

function finalizeGameScore(){ try{ if(_gameState&&_gameState.mode==='play'&&_gameState.score>0){
 const b=parseInt(sessionStorage.getItem('cliptag_game_best')||'0',10);
 if(_gameState.score>b) sessionStorage.setItem('cliptag_game_best',String(_gameState.score)); } }catch(e){}
 stopMiniGame(); }

window.addEventListener('DOMContentLoaded',()=>{ loadAssets(); startMiniGame(); });
if(typeof finalizeGameScore==='undefined'){ window.finalizeGameScore=function(){}; }

let _dbgOn=false;
console.log=(function(o){ return function(){ if(_dbgOn) o.apply(console,arguments); }; })(console.log);
function toggleDebug(){ _dbgOn=!_dbgOn; $('dbgInfo').textContent='Debug-Log: '+(_dbgOn?'an (F12)':'aus'); }
</script>
